# LLM4 - Data efficiency experiment (no pretraining, stacking with load-from-prev)
# All paths relative for Kaggle / Linux

# Local test mode: run on CPU with small data. Set to true to test locally before Kaggle.
# When true, Phase 1 uses local_phase1_base_size (100) and local_phase1_large_size (500) so you can verify the pipeline; revert to 50k/100k for Kaggle.
local_test: true
local_phase1_base_size: 100
local_phase1_large_size: 500

base_model: Qwen/Qwen2.5-0.5B-Instruct
model_cache: ./models/base

# Data paths
train_100: ./data/train_100.jsonl
balanced_train_100: ./data/balanced_train_100.jsonl
train_1000: ./data/train_1000.jsonl
train_5000: ./data/train_5000.jsonl
train_50000: ./data/train_50000.jsonl
train_100000: ./data/train_100000.jsonl
test_200: ./data/test_200.jsonl
cot_train: ./data/cot_train.jsonl
enhanced_train: ./data/enhanced_train.jsonl
failures_data: ./data/probe_failures.jsonl
rag_documents: ./data/rag_documents/arithmetic_facts.jsonl

# Stage 0 base training (overridden when local_test: true -> train_100, 100 samples)
stage0_train_data: ./data/train_5000.jsonl
stage0_samples: 5000

# Model output paths (stacking: each stage loads previous)
base_output: ./models/base
cot_output: ./models/cot
probe_guided_output: ./models/probe_guided
moe_output: ./models/moe
pruned_output: ./models/pruned
final_output: ./models/final
output_dir: ./output

# Phase 1: base = guided/small comparison (50k); large = brute-force ceiling (100k). Kaggle run showed 5k gave ~3% (no signal); 50k gave 62%.
phase1_base_size: 50000
phase1_large_size: 100000
random_100_output: ./models/random_100
random_500_output: ./models/random_500
random_1000_output: ./models/random_1000
guided_100_output: ./models/guided_100
random_50k_output: ./models/random_50k
random_100k_output: ./models/random_100k
guided_50k_output: ./models/guided_50k
balanced_random_100_output: ./models/balanced_random_100
balanced_random_50k_output: ./models/balanced_random_50k

# Training
max_seq_length: 256
batch_size: 1
gradient_accumulation: 16
epochs: 1
learning_rate: 2.0e-4
learning_rate_from_scratch: 2.0e-4
lr_scheduler_type: linear
lr_scheduler_from_scratch: cosine
warmup_ratio: 0.0
warmup_ratio_from_scratch: 0.1
lora_r: 8
lora_alpha: 16
use_cpu: true
dtype: float32
save_strategy: steps
save_steps: 5
save_total_limit: 2

# Validation (proposal §1)
val_split_ratio: 0.1
val_seed: 42
evaluation_strategy: epoch
load_best_model_at_end: true
metric_for_best_model: eval_loss

# Reproducibility and statistics
seed: 42
bootstrap_iterations: 500
bootstrap_ci_percentile: [2.5, 97.5]

# Per stage (scaled for 5k/50k base: 500 each)
stage1_cot_samples: 500
stage2_targeted_samples: 500
stage3_moe_samples: 500
stage4_prune_samples: 500
stage5_qat_samples: 500
targeted_examples_per_gap: 50
difficulty_levels: 3
qat_max_epochs: 3
pruning_target_sparsity: 0.2
preserve_attention: true
qat_bits: 4
qat_calibration_samples: 200

# MoE
num_experts: 4
experts_per_token: 2
expert_categories:
  - addition
  - subtraction
  - multiplication
  - division_and_mixed

# RAG
rag_db_path: ./rag/chroma_db
rag_embedding_model: all-MiniLM-L6-v2
rag_top_k: 3
rag_chunk_size: 256
