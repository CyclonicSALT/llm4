---
# LLM4 - Data efficiency experiment (no pretraining, stacking with load-from-prev)
# All paths relative for Kaggle / Linux

# local_test: true = use CPU and small runs; false = GPU / longer runs. No fixed training sizes — base/large below are the only knobs (UI or config).
local_test: true
# Phase 1 training sizes: choose any base and large (e.g. 10/20 smoke, 100/500 dev, 5000/20000, etc.). Data is generated to match these.
local_phase1_base_size: 1
local_phase1_large_size: 1

base_model: Qwen/Qwen2.5-0.5B-Instruct
model_cache: ./models/base

# Data paths — Phase 1 files are generated by data/generate_arithmetic.py to match phase1_base_size / phase1_large_size
train_phase1_base: ./data/train_phase1_base.jsonl
train_phase1_large: ./data/train_phase1_large.jsonl
balanced_train_phase1_base: ./data/balanced_train_phase1_base.jsonl
test_200: ./data/test_200.jsonl
cot_train: ./data/cot_train.jsonl
enhanced_train: ./data/enhanced_train.jsonl
failures_data: ./data/probe_failures.jsonl
rag_documents: ./data/rag_documents/arithmetic_facts.jsonl

# Stage 0: if set, use this data/samples; otherwise use train_phase1_base + local_phase1_base_size
stage0_train_data:
stage0_samples:

# Model output paths (stacking: each stage loads previous)
base_output: ./models/base
cot_output: ./models/cot
probe_guided_output: ./models/probe_guided
moe_output: ./models/moe
pruned_output: ./models/pruned
final_output: ./models/final
output_dir: ./output

# Training
max_seq_length: 256
batch_size: 1
gradient_accumulation: 16
epochs: 1
learning_rate: 2.0e-4
learning_rate_from_scratch: 2.0e-4
lr_scheduler_type: linear
lr_scheduler_type_from_scratch: cosine
warmup_ratio_from_scratch: 0.1
val_fraction: 0.1
val_seed: 42
lora_r: 8
lora_alpha: 16
use_cpu: true
dtype: float32
save_strategy: steps
save_steps: 5
save_total_limit: 2

# Per stage
stage1_cot_samples: 100
stage2_targeted_samples: 100
stage3_moe_samples: 100
stage4_prune_samples: 100
stage5_qat_samples: 100
targeted_examples_per_gap: 20
difficulty_levels: 3
qat_max_epochs: 3
pruning_target_sparsity: 0.2
preserve_attention: true
qat_bits: 4
qat_calibration_samples: 200

# MoE
num_experts: 4
experts_per_token: 2
expert_categories:
  - addition
  - subtraction
  - multiplication
  - division_and_mixed

# RAG
rag_db_path: ./rag/chroma_db
rag_embedding_model: all-MiniLM-L6-v2
rag_top_k: 3
rag_chunk_size: 256
